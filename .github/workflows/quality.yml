name: Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  hardened-standard:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Enforce Bun lockfile
        run: test -f bun.lock

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Hardened coding standard
        env:
          CODING_STANDARD_BASE_REF: origin/main
          CODING_STANDARD_STRICT: "1"
        run: bun run check:ci
